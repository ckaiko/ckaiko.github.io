name: Sync Now Page Data

on:
  workflow_dispatch:  # Manual trigger only — go to Actions → "Sync Now Page Data" → Run workflow

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Letterboxd data
        run: node scripts/fetch-letterboxd.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/letterboxd.json data/posters/
          git diff --cached --quiet || git commit -m "chore: update Now page data [skip ci]"
          git push
