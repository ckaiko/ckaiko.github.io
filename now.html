<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Now &mdash; Cecilia Aiko</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="site-blobs" class="bg-blobs" aria-hidden="true"></div>

  <nav id="navbar" data-active="now" data-root="."></nav>

  <header class="page-header">
    <h1 data-animate="fade-up">Now</h1>
    <p data-animate="fade-up">What I'm currently watching, listening to, and reading</p>
  </header>

  <!-- FILMS -->
  <section class="section">
    <div class="container">
      <h2 class="section-title" data-animate="fade-up">&#127916; Films</h2>
      <div id="now-films"></div>
    </div>
  </section>

  <!-- MUSIC (Spotify) -->
  <section class="section section-alt">
    <div class="container">
      <h2 class="section-title" data-animate="fade-up">&#127925; Music</h2>
      <p class="section-subtitle" data-animate="fade-up">Powered by Spotify</p>
      <div id="now-music"></div>
    </div>
  </section>

  <!-- TV SHOWS -->
  <section class="section">
    <div class="container">
      <h2 class="section-title" data-animate="fade-up">&#128250; TV Shows</h2>
      <div id="now-tv"></div>
    </div>
  </section>

  <!-- BOOKS -->
  <section class="section section-alt">
    <div class="container">
      <h2 class="section-title" data-animate="fade-up">&#128214; Books</h2>
      <div id="now-books"></div>
    </div>
  </section>

  <footer id="footer"></footer>

  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
